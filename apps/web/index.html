<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writedown</title>
    <meta
      name="description"
      content="Writedown — a fast, offline-first whiteboard for sketching ideas with pen, shapes, and text."
    />
    <meta name="application-name" content="Writedown" />
    <meta name="theme-color" content="#0f172a" />

    <meta property="og:title" content="Writedown" />
    <meta
      property="og:description"
      content="A fast, offline-first whiteboard for sketching ideas with pen, shapes, and text."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Writedown" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Writedown" />
    <meta
      name="twitter:description"
      content="A fast, offline-first whiteboard for sketching ideas with pen, shapes, and text."
    />

    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (!p) return;
        params.delete("p");
        var rest = params.toString();
        var search = rest ? "?" + rest : "";
        var base = window.location.pathname.replace(/\/$/, "");
        var decoded = p;
        try {
          decoded = decodeURIComponent(p);
        } catch (e) {}
        if (decoded && decoded[0] !== "/") decoded = "/" + decoded;
        window.history.replaceState(null, "", base + decoded + search + window.location.hash);
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
